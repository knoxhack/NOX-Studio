services:
  nox-generation-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: nox-studio-generation-worker:local
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NOX_GENERATION_WORKER_RENDER: "1"
      NOX_RENDER_UPLOAD: "1"
      NOX_GENERATION_WORKER_INTERVAL_MS: "${NOX_GENERATION_WORKER_INTERVAL_MS:-15000}"
      NOX_GENERATION_WORKER_RENDER_DIR: /app/dist/generation-worker-renders
    command: ["npm", "run", "jobs:worker", "--", "--render", "--upload"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "scripts/worker-healthcheck.mjs", "--quiet"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s
    volumes:
      - nox-worker-renders:/app/dist/generation-worker-renders

volumes:
  nox-worker-renders:
